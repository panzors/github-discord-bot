name: Deploy to Azure Functions

# Manual trigger only — run this from the Actions tab via "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # root of the repo holds host.json
  NODE_VERSION: '22.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify secrets are accessible
        run: |
          if [ -z "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ]; then
            echo "ERROR: AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret is not set"
            exit 1
          fi
          if [ -z "${{ vars.AZURE_FUNCTIONAPP_NAME }}" ]; then
            echo "ERROR: AZURE_FUNCTIONAPP_NAME variable is not set"
            exit 1
          fi
          echo "✓ All required secrets and variables are present"
          
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
